name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify build artifacts
        run: |
          echo "=== Required file check ==="
          test -f .nojekyll              || (echo "FAIL: .nojekyll missing — Jekyll will corrupt binary files" && exit 1)
          test -f Build/WebGl.wasm       || (echo "FAIL: Build/WebGl.wasm missing" && exit 1)
          test -f Build/WebGl.data       || (echo "FAIL: Build/WebGl.data missing" && exit 1)
          test -f Build/WebGl.loader.js  || (echo "FAIL: Build/WebGl.loader.js missing" && exit 1)
          test -f Build/WebGl.framework.js || (echo "FAIL: Build/WebGl.framework.js missing" && exit 1)
          echo "All required files present."
          echo ""
          echo "=== Build asset sizes ==="
          du -sh Build/* | sort -rh
          echo ""
          echo "=== Total payload ==="
          du -sh Build/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Upload source maps to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: kunta-content
          SENTRY_PROJECT: node
        run: |
          npx --yes @sentry/cli@latest releases new ${{ github.sha }}
          npx @sentry/cli@latest releases files ${{ github.sha }} \
            upload-sourcemaps . \
            --url-prefix '/' \
            --ext js \
            --ext html \
            --ignore Build/ \
            --ignore node_modules/ \
            --include-sources
          npx @sentry/cli@latest releases set-commits ${{ github.sha }} --auto
          npx @sentry/cli@latest releases finalize ${{ github.sha }}

      - name: Inject Sentry DSN and release into index.html
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          sed -i "s|%%SENTRY_DSN%%|${SENTRY_DSN}|g" index.html
          sed -i "s|%%SENTRY_RELEASE%%|${{ github.sha }}|g" index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
